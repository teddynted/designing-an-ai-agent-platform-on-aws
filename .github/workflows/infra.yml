name: Infrastructure

# Validates the CloudFormation templates on every change, deploys the dev
# environment automatically when infra changes land on main, and keeps a manual,
# environment-gated path for staging and prod. Validation needs no AWS
# credentials; deployment assumes a role over OIDC and never uses long-lived
# secrets.
on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy
        type: choice
        options: [dev, staging, prod]
        default: dev
      confirm:
        description: 'Type "deploy" to confirm a real deployment'
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  # Serialise runs per ref so two deployments never race the same stacks.
  group: infra-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Validation — runs on every PR and push. No credentials required.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cfn-lint
        run: pip install --disable-pip-version-check cfn-lint

      - name: Lint CloudFormation templates
        run: cfn-lint infra/cloudformation/*.yaml

      # The Spot drain agent exists in two places by necessity: baked into the
      # custom AMI, and written out at boot by an instance that has no AMI to bake
      # it. They must be byte-identical, and a comment asking nicely is not a
      # mechanism — so the build fails if they drift.
      - name: Check the drain agent has not drifted
        run: python3 infra/scripts/drain-sync.py --check

      # The AMI pipeline is shell, and shell fails quietly. These scripts run
      # unattended, as root, on a machine nobody is watching.
      - name: Shell syntax check the AMI pipeline
        run: |
          for script in infra/scripts/*.sh infra/scripts/ami/*.sh; do
            bash -n "$script" || exit 1
          done
          echo "all shell scripts parse"

      # cfn-lint checks each template in isolation, so it cannot see that one
      # stack imports a value another stack forgot to export. This does.
      - name: Check cross-stack imports resolve
        shell: python
        run: |
          import glob, re, sys

          exports, imports = set(), {}
          for path in sorted(glob.glob("infra/cloudformation/*.yaml")):
              text = open(path).read()
              for m in re.finditer(r'Export:\s*\n\s*Name:\s*!Sub\s*"([^"]+)"', text):
                  exports.add(m.group(1))
              for m in re.finditer(r'Fn::ImportValue:\s*!Sub\s*"([^"]+)"', text):
                  imports.setdefault(m.group(1), path)

          missing = {name: src for name, src in imports.items() if name not in exports}
          if missing:
              for name, src in missing.items():
                  print(f"::error file={src}::import '{name}' has no matching export")
              sys.exit(1)
          print(f"{len(imports)} cross-stack imports all resolve against {len(exports)} exports")

      # The Lambdas are Go: the scheduler's start/stop, and the Spot handlers.
      # Vet, test, and cross-compile them for the Lambda runtime (arm64 Linux) so
      # a broken handler is caught before deploy.
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/lambda/go.mod
          cache-dependency-path: infra/lambda/go.sum

      - name: Test and build the Go Lambdas
        working-directory: infra/lambda
        run: |
          go vet ./...
          go test ./...
          for fn in start stop interruption statechange webhook; do
            GOOS=linux GOARCH=arm64 go build -tags lambda.norpc -o "/tmp/$fn" "./cmd/$fn"
          done

  # ---------------------------------------------------------------------------
  # Deployment — manual only, gated behind an environment and an explicit
  # confirmation. Assumes an IAM role over OIDC; no static credentials.
  #
  # Requires one-time setup in the AWS account and this repository:
  #   * an IAM OIDC identity provider for token.actions.githubusercontent.com
  #   * a deploy role trusting this repo, its ARN in the repository or
  #     environment variable AWS_DEPLOY_ROLE_ARN
  #   * the target region in the variable AWS_REGION
  #   * GitHub environments named dev / staging / prod (add required reviewers
  #     to prod for a manual approval gate)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }})
    # Runs automatically when infra changes land on main (deploying dev), and
    # manually via Run workflow for any environment (guarded by the confirm
    # word, so staging and prod are never a one-click accident).
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')
    needs: validate
    runs-on: ubuntu-latest
    # dev on push; the chosen environment on manual dispatch. Environment
    # protection rules (e.g. required reviewers on prod) still apply.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write   # required to request the OIDC token
      contents: read
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # PURCHASE defaults to spot. Set the repository variable
      # AWS_PURCHASE_OPTION to "on-demand" to deploy without Spot — useful when
      # the account's Spot quota is still zero — then remove it once a Spot
      # quota increase is approved.
      #
      # AWS_INSTANCE_TYPE overrides the instance type. Set it when the template's
      # default has no Spot capacity in this environment's AZ, which fails the
      # deploy with "There is no Spot capacity available that matches your
      # request" — a capacity problem, not a quota or price one. Leave it unset to
      # take the template's default.
      # AWS_AMI_ID pins the custom AMI the compute stack launches from (Milestone
      # 4). Left unset, `aws cloudformation deploy` keeps whatever the stack was
      # last deployed with, so a merge never silently changes the image an
      # instance is running — which is exactly the property immutable
      # infrastructure is supposed to have.
      #
      # Images are built by the separate, manually-dispatched `AMI` workflow: a
      # build is a deliberate, versioned event, not something that happens because
      # a README changed.
      - name: Deploy all stacks
        run: >-
          make -C infra deploy
          ENV="$TARGET_ENV"
          REGION="${{ vars.AWS_REGION }}"
          PURCHASE="${{ vars.AWS_PURCHASE_OPTION || 'spot' }}"
          INSTANCE_TYPE="${{ vars.AWS_INSTANCE_TYPE }}"
          AMI_ID="${{ vars.AWS_AMI_ID }}"

      # Spot interruption handling (Milestone 3). It is deployed after the core
      # stacks, not with them: its Lambdas must be built and uploaded to the
      # artifact bucket that 04-storage creates, so it needs both the Go toolchain
      # and a bucket that exists. `make spot` packages and deploys in one step.
      - uses: actions/setup-go@v5
        with:
          go-version-file: infra/lambda/go.mod
          cache-dependency-path: infra/lambda/go.sum

      - name: Deploy Spot interruption handling
        run: >-
          make -C infra spot
          ENV="$TARGET_ENV"
          REGION="${{ vars.AWS_REGION }}"

      - name: Show stack outputs
        run: make -C infra outputs ENV="$TARGET_ENV" REGION="${{ vars.AWS_REGION }}"
