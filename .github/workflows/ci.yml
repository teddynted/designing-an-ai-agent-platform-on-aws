name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

  lint:
    name: Format and vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: make fmt-check

      - name: go vet
        run: make vet

  release-dry-run:
    name: Release dry run
    runs-on: ubuntu-latest
    steps:
      # The release CLI derives the version from the tag history, so it needs
      # the full history rather than a shallow clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Proves that the next release can be calculated from this commit before
      # anyone tries to cut one. --any-branch because pull requests build a
      # detached merge commit, and --allow-empty because a branch may carry no
      # releasable commits yet.
      - name: Preview the next patch release
        run: go run ./cmd/release patch --dry-run --any-branch --allow-empty --no-fetch

      - name: Build the release binaries
        run: make dist
