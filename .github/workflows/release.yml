name: Release

# Post-tag automation only. The version was already decided, validated, and
# tagged by `go run ./cmd/release <bump>` on a developer's machine. Nothing
# here recalculates it.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # v1.4.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # v1.4.0-rc.1

permissions:
  contents: write

# Two pushes of the same tag must not race each other into the API.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish the GitHub Release
    runs-on: ubuntu-latest
    steps:
      # The CLI derives the previous tag and the commit range from history, so
      # a shallow clone would produce empty release notes.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: make verify

      - name: Build the release binaries
        env:
          TAG: ${{ github.ref_name }}
        run: make dist VERSION="$TAG"

      # Renders the notes, creates the release, and attaches the binaries.
      # Re-running the workflow for a tag updates the release in place.
      - name: Publish
        env:
          TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/release publish --tag "$TAG" --asset 'dist/*'

  changelog:
    name: Update CHANGELOG.md
    needs: publish
    runs-on: ubuntu-latest
    steps:
      # The tag is a point in history; CHANGELOG.md lives on the default branch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate the entry
        env:
          TAG: ${{ github.ref_name }}
        run: go run ./cmd/release changelog --tag "$TAG" --write

      # `[skip ci]` keeps this commit from triggering the CI workflow again.
      # If the default branch is protected, this push needs a token that is
      # allowed to bypass the rule; see RELEASE_MANAGEMENT.md.
      - name: Commit the entry
        env:
          TAG: ${{ github.ref_name }}
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already documents $TAG, nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): add $TAG [skip ci]"
          git push origin "HEAD:$BRANCH"
