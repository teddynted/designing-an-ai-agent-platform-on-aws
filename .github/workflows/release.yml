# Publishes the GitHub release when a version tag is pushed.
#
# The tag is the trigger, not the input: `make release-minor` runs locally, cuts
# the tag, and you push it. This workflow then publishes the release that tag
# names. Splitting it this way means the notes in the release are generated from
# the same commit range the changelog already recorded, and a failed publish can
# be retried without re-cutting anything.
#
# fetch-depth: 0 is load-bearing. actions/checkout fetches a single commit by
# default; the release notes are a diff against the previous tag, and neither the
# tag nor the range exists in a shallow clone.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest

    # The only job that needs to write. Scoped here rather than at the workflow
    # level so the test job cannot touch the repository.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # The notes are a diff against the previous tag. A shallow clone has
          # neither the tag nor the range.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check the tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match VERSION (${file})."
            echo "The tag and the file must agree, or the release notes will describe the wrong version."
            exit 1
          fi

      - name: Publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: go run ./cmd/release publish -v "${GITHUB_REF_NAME}"
