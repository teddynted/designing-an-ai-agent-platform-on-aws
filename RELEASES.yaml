releases:
- version: 0.1.0
  title: Initial architecture
  status: released
  date: "2026-07-09"
  milestone: 1
  summary: Design and documentation only. No application implementation, no CloudFormation templates, no workflows. Establishes the architectural foundation that later milestones build on.
  highlights:
  - Three-plane decomposition of control, agent, and inference workloads
  - Model Gateway seam with an OpenAI-compatible contract
  - Agent containment by removing privilege rather than filtering prompts
- version: 0.2.0
  title: Release management
  status: released
  date: "2026-07-10"
  summary: "A Go release-management module: SemVer arithmetic, changelog generation from commit history, annotated tagging, and GitHub release publication. Repository tooling; it delivers no architectural milestone."
