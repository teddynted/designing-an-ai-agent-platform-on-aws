<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 830" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="The AI Agent Platform as built after Milestone 4: an internet gateway fronts a VPC public subnet whose default-deny security group contains an EC2 Spot instance launched from a custom AMI with an encrypted disposable root volume; the instance saves artifacts to S3 and ships logs to CloudWatch; EC2 lifecycle events land on the account default event bus, where five EventBridge rules invoke two Go Lambdas that re-publish onto the platform event bus; operators connect through SSM Session Manager and there is no inbound access and no AI workload deployed.">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#232F3E"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7D8998"/>
    </marker>
    <marker id="agr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3F8624"/>
    </marker>
    <marker id="apk" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E7157B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="830" fill="#FFFFFF"/>
  <text x="580" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#232F3E">The Platform As Built — Milestones 2 · 3 · 4</text>
  <text x="580" y="54" text-anchor="middle" font-size="12" fill="#5A6B7B">Deployed to a live account · eight CloudFormation stacks + an image pipeline · no AI workload yet</text>

  <!-- Internet -->
  <rect x="26" y="168" width="76" height="60" rx="10" fill="#6B7785"/>
  <text x="64" y="205" text-anchor="middle" font-size="22" fill="#fff">&#127760;</text>
  <text x="64" y="244" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Internet</text>
  <text x="64" y="258" text-anchor="middle" font-size="9.5" fill="#5A6B7B">egress only</text>

  <!-- Operator -->
  <rect x="26" y="470" width="76" height="60" rx="10" fill="#6B7785"/>
  <text x="64" y="508" text-anchor="middle" font-size="22" fill="#fff">&#128100;</text>
  <text x="64" y="546" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Operator</text>
  <text x="64" y="560" text-anchor="middle" font-size="9.5" fill="#5A6B7B">SSM Session Manager</text>
  <text x="64" y="574" text-anchor="middle" font-size="9.5" fill="#5A6B7B">no SSH · no key pair</text>

  <!-- AWS Cloud -->
  <rect x="150" y="76" width="988" height="638" rx="12" fill="none" stroke="#232F3E" stroke-width="2"/>
  <rect x="164" y="90" width="34" height="18" rx="3" fill="#232F3E"/>
  <text x="181" y="103" font-size="11" fill="#fff" font-weight="700" text-anchor="middle">aws</text>
  <text x="208" y="104" font-size="14" fill="#232F3E" font-weight="700">AWS Cloud</text>

  <!-- Region -->
  <rect x="172" y="120" width="950" height="580" rx="10" fill="none" stroke="#00A4A6" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="188" y="142" font-size="12" fill="#00838A" font-weight="700">Region — us-east-1</text>

  <!-- ================= VPC ================= -->
  <rect x="206" y="162" width="426" height="452" rx="9" fill="none" stroke="#8C4FFF" stroke-width="2"/>
  <text x="222" y="184" font-size="12.5" fill="#6B25E0" font-weight="700">VPC 10.20.0.0/16 · 01-network</text>

  <!-- Internet Gateway -->
  <g>
    <rect x="240" y="196" width="52" height="52" rx="9" fill="#8C4FFF"/>
    <text x="266" y="229" text-anchor="middle" font-size="18" fill="#fff">&#127760;</text>
    <text x="304" y="218" font-size="11" fill="#232F3E" font-weight="700">Internet Gateway</text>
    <text x="304" y="233" font-size="9.5" fill="#5A6B7B">public route table · no NAT gateway</text>
  </g>

  <!-- Public subnet -->
  <rect x="224" y="268" width="392" height="330" rx="7" fill="#F2F9EE" stroke="#7AA116" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="240" y="288" font-size="11.5" fill="#4E6C0E" font-weight="700">Public subnet · single AZ</text>

  <!-- Security group -->
  <rect x="242" y="300" width="356" height="282" rx="7" fill="#F4EEFF" stroke="#8C4FFF" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="258" y="320" font-size="11" fill="#6B25E0" font-weight="700">Security group — NO inbound rules</text>

  <!-- EC2 Spot -->
  <g>
    <rect x="288" y="336" width="62" height="62" rx="9" fill="#ED7100"/>
    <text x="319" y="375" text-anchor="middle" font-size="22" fill="#fff">&#128421;</text>
    <text x="319" y="414" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">EC2 Spot</text>
    <text x="319" y="428" text-anchor="middle" font-size="9.5" fill="#5A6B7B">c5.xlarge · IMDSv2</text>
    <text x="319" y="441" text-anchor="middle" font-size="9.5" fill="#5A6B7B">~70% off On-Demand</text>
  </g>

  <!-- Root EBS -->
  <g>
    <rect x="490" y="336" width="62" height="62" rx="9" fill="#3F8624"/>
    <text x="521" y="375" text-anchor="middle" font-size="20" fill="#fff">&#128190;</text>
    <text x="521" y="414" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Root EBS</text>
    <text x="521" y="428" text-anchor="middle" font-size="9.5" fill="#5A6B7B">encrypted · gp3</text>
    <text x="521" y="441" text-anchor="middle" font-size="9.5" fill="#5A6B7B">delete-on-termination</text>
  </g>

  <!-- EBS attached -->
  <line x1="352" y1="367" x2="486" y2="367" stroke="#3F8624" stroke-width="1.6" marker-end="url(#agr)"/>
  <text x="419" y="360" text-anchor="middle" font-size="9.5" fill="#2F6417">root volume</text>

  <!-- What is on the instance -->
  <rect x="262" y="460" width="316" height="106" rx="7" fill="#FFF4E6" stroke="#ED7100" stroke-width="1.1"/>
  <rect x="272" y="470" width="26" height="15" rx="3" fill="#3F8624"/>
  <text x="285" y="481.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">M4</text>
  <text x="306" y="482" font-size="10.5" fill="#232F3E" font-weight="700">Baked into the custom AMI</text>
  <text x="272" y="498" font-size="9.5" fill="#5A6B7B">Docker · Go · Node · Python · CloudWatch agent</text>
  <text x="272" y="512" font-size="9.5" fill="#5A6B7B">boots in 6.2 s — UserData only configures</text>

  <rect x="272" y="522" width="26" height="15" rx="3" fill="#E7157B"/>
  <text x="285" y="533.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">M3</text>
  <text x="306" y="534" font-size="10.5" fill="#232F3E" font-weight="700">spot-drain agent</text>
  <text x="272" y="550" font-size="9.5" fill="#5A6B7B">polls IMDS · on notice: stop work, save to S3</text>
  <text x="272" y="562" font-size="9.5" fill="#5A6B7B">the 2-minute window belongs to the instance</text>

  <!-- ================= Regional services ================= -->

  <!-- Custom AMI -->
  <g>
    <rect x="672" y="164" width="58" height="58" rx="9" fill="#7AA116"/>
    <text x="701" y="199" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">AMI</text>
    <text x="701" y="238" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">Custom AMI</text>
    <text x="701" y="252" text-anchor="middle" font-size="9.5" fill="#5A6B7B">aiap-platform-v1.0.0</text>
    <text x="701" y="265" text-anchor="middle" font-size="9.5" fill="#5A6B7B">versioned · immutable</text>
  </g>

  <!-- Default event bus -->
  <g>
    <rect x="856" y="164" width="58" height="58" rx="9" fill="#E7157B"/>
    <text x="885" y="200" text-anchor="middle" font-size="20" fill="#fff">&#8646;</text>
    <text x="885" y="238" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">Default event bus</text>
    <text x="885" y="252" text-anchor="middle" font-size="9.5" fill="#5A6B7B">where aws.ec2 events land</text>
    <text x="885" y="265" text-anchor="middle" font-size="9.5" fill="#5A6B7B">(a custom bus never would)</text>
  </g>

  <!-- 5 rules -->
  <rect x="806" y="292" width="158" height="30" rx="6" fill="#FCE8F2" stroke="#E7157B" stroke-width="1.1"/>
  <text x="885" y="311" text-anchor="middle" font-size="10.5" fill="#232F3E" font-weight="700">5 EventBridge rules · 08-spot</text>

  <!-- Spot Lambdas -->
  <g>
    <rect x="856" y="344" width="58" height="58" rx="9" fill="#ED7100"/>
    <text x="885" y="382" text-anchor="middle" font-size="22" fill="#fff">&#955;</text>
    <text x="885" y="418" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">Spot handlers (Go)</text>
    <text x="885" y="432" text-anchor="middle" font-size="9.5" fill="#5A6B7B">interruption · state-change</text>
    <text x="885" y="445" text-anchor="middle" font-size="9.5" fill="#5A6B7B">filter by tag · count · re-publish</text>
  </g>

  <!-- Platform event bus -->
  <g>
    <rect x="856" y="484" width="58" height="58" rx="9" fill="#E7157B"/>
    <text x="885" y="520" text-anchor="middle" font-size="20" fill="#fff">&#8646;</text>
    <text x="885" y="558" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">Platform event bus</text>
    <text x="885" y="572" text-anchor="middle" font-size="9.5" fill="#5A6B7B">05-events · the seam for M5+</text>
    <text x="885" y="585" text-anchor="middle" font-size="9.5" fill="#5A6B7B">→ dispatch Lambda (placeholder)</text>
  </g>

  <!-- CloudWatch -->
  <g>
    <rect x="1024" y="576" width="58" height="58" rx="9" fill="#CD2264"/>
    <text x="1053" y="614" text-anchor="middle" font-size="20" fill="#fff">&#128200;</text>
    <text x="1053" y="652" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">CloudWatch</text>
    <text x="1053" y="666" text-anchor="middle" font-size="9.5" fill="#5A6B7B">logs + Spot metrics</text>
    <text x="1053" y="679" text-anchor="middle" font-size="9.5" fill="#5A6B7B">interruptions, per instance type</text>
  </g>

  <!-- S3 -->
  <g>
    <rect x="672" y="484" width="58" height="58" rx="9" fill="#3F8624"/>
    <text x="701" y="521" text-anchor="middle" font-size="20" fill="#fff">&#128451;</text>
    <text x="701" y="558" text-anchor="middle" font-size="11" fill="#232F3E" font-weight="700">S3 artifact bucket</text>
    <text x="701" y="572" text-anchor="middle" font-size="9.5" fill="#5A6B7B">versioned · encrypted · TLS-only</text>
    <text x="701" y="585" text-anchor="middle" font-size="9.5" fill="#5A6B7B">the only durable store</text>
  </g>

  <!-- ================= Connections ================= -->

  <!-- Internet <-> IGW -->
  <path d="M102,198 C160,198 190,220 236,222" fill="none" stroke="#232F3E" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- IGW -> EC2 -->
  <path d="M266,250 C266,300 292,312 312,332" fill="none" stroke="#232F3E" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="290" font-size="9.5" fill="#5A6B7B">egress</text>

  <!-- Operator -> EC2 (SSM reaches inside the security group; that is the point) -->
  <path d="M102,498 C150,498 172,432 232,412 C254,404 270,388 284,372" fill="none" stroke="#7D8998" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <text x="108" y="452" font-size="9.5" fill="#5A6B7B">SSM · no open port</text>

  <!-- Custom AMI -> EC2: routed BELOW the gateway labels -->
  <path d="M672,198 C608,216 520,246 472,290 C456,306 450,320 446,332 C428,344 384,338 356,342" fill="none" stroke="#7AA116" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#agr)"/>
  <text x="498" y="248" font-size="9.5" fill="#4E6C0E" font-weight="700">launched from (AmiId)</text>

  <!-- EC2 lifecycle events -> DEFAULT bus: leaves to the right, crossing no label -->
  <path d="M600,358 C648,338 704,300 786,240 C812,220 832,204 850,194" fill="none" stroke="#E7157B" stroke-width="1.4" marker-end="url(#apk)"/>
  <text x="664" y="330" font-size="9.5" fill="#B01267" font-weight="700">interruption warning</text>
  <text x="664" y="343" font-size="9.5" fill="#B01267" font-weight="700">state changes</text>

  <!-- default bus -> rules -> lambdas -->
  <line x1="885" y1="224" x2="885" y2="288" stroke="#E7157B" stroke-width="1.4" marker-end="url(#apk)"/>
  <line x1="885" y1="322" x2="885" y2="340" stroke="#E7157B" stroke-width="1.4" marker-end="url(#apk)"/>

  <!-- lambdas -> platform bus -->
  <line x1="885" y1="452" x2="885" y2="480" stroke="#E7157B" stroke-width="1.4" marker-end="url(#apk)"/>
  <text x="893" y="470" font-size="9.5" fill="#B01267">re-publish</text>

  <!-- EC2 -> S3 -->
  <path d="M578,472 C614,478 636,490 668,502" fill="none" stroke="#3F8624" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#agr)"/>
  <text x="624" y="470" font-size="9.5" fill="#2F6417" font-weight="700">artifacts · drained work</text>

  <!-- EC2 -> CloudWatch: along the empty bottom band, under S3 -->
  <path d="M578,552 C640,612 820,648 1020,624" fill="none" stroke="#CD2264" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="796" y="620" font-size="9.5" fill="#5A6B7B">boot log · drain log</text>

  <!-- lambdas -> CloudWatch -->
  <path d="M914,378 C976,420 1004,500 1040,570" fill="none" stroke="#CD2264" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="948" y="470" font-size="9.5" fill="#5A6B7B">metrics</text>

  <!-- ================= Legend / honesty panel ================= -->
  <rect x="150" y="726" width="988" height="88" rx="8" fill="#F7F9FA" stroke="#D5DBDB" stroke-width="1"/>

  <rect x="166" y="740" width="26" height="15" rx="3" fill="#7D8998"/>
  <text x="179" y="751.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">M2</text>
  <text x="200" y="752" font-size="10" fill="#232F3E">VPC · IAM · EC2 · S3 · EventBridge · CloudWatch — the instance is <tspan font-weight="700">disposable</tspan></text>

  <rect x="166" y="762" width="26" height="15" rx="3" fill="#E7157B"/>
  <text x="179" y="773.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">M3</text>
  <text x="200" y="774" font-size="10" fill="#232F3E">Spot + interruption handling — disposability is now <tspan font-weight="700">safe</tspan> (work survives a reclaim)</text>

  <rect x="166" y="784" width="26" height="15" rx="3" fill="#3F8624"/>
  <text x="179" y="795.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">M4</text>
  <text x="200" y="796" font-size="10" fill="#232F3E">Custom AMIs — disposability is now <tspan font-weight="700">cheap</tspan> (76 s → 6.2 s boot, immutable images)</text>

  <line x1="690" y1="740" x2="690" y2="800" stroke="#D5DBDB" stroke-width="1"/>
  <text x="710" y="752" font-size="10" fill="#B0341D" font-weight="700">NOT built yet</text>
  <text x="710" y="768" font-size="9.5" fill="#5A6B7B">n8n · OpenClaw · Ollama · any model inference</text>
  <text x="710" y="782" font-size="9.5" fill="#5A6B7B">Auto Scaling group (still one instance) · private subnets</text>
  <text x="710" y="796" font-size="9.5" fill="#5A6B7B">alarms + dashboards · scheduled AMI rebuilds</text>
</svg>
