<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 860" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="AWS architecture diagram for the AI agent platform">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#232F3E"/>
    </marker>
    <marker id="arrowP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8C4FFF"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7D8998"/>
    </marker>
  </defs>

  <!-- white background so the diagram reads in both GitHub light and dark themes -->
  <rect x="0" y="0" width="1120" height="860" fill="#FFFFFF"/>

  <text x="560" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#232F3E">AI Agent Platform — AWS Architecture</text>
  <text x="560" y="54" text-anchor="middle" font-size="12" fill="#5A6B7B">Milestone 1 · proposed design · nothing deployed</text>

  <!-- ============ EXTERNAL ACTORS ============ -->
  <g>
    <rect x="34" y="150" width="70" height="70" rx="10" fill="#6B7785"/>
    <text x="69" y="193" text-anchor="middle" font-size="26" fill="#fff">&#128100;</text>
    <text x="69" y="238" text-anchor="middle" font-size="12" fill="#232F3E" font-weight="700">Developer</text>

    <rect x="34" y="330" width="70" height="70" rx="10" fill="#24292F"/>
    <text x="69" y="373" text-anchor="middle" font-size="26" fill="#fff">&#128187;</text>
    <text x="69" y="418" text-anchor="middle" font-size="12" fill="#232F3E" font-weight="700">GitHub</text>
  </g>

  <!-- ============ AWS CLOUD BOUNDARY ============ -->
  <rect x="190" y="90" width="900" height="740" rx="12" fill="none" stroke="#232F3E" stroke-width="2"/>
  <rect x="204" y="104" width="20" height="20" rx="3" fill="#232F3E"/>
  <text x="205" y="119" font-size="13" fill="#fff" font-weight="700" text-anchor="middle" transform="translate(9,0)">aws</text>
  <text x="234" y="119" font-size="14" fill="#232F3E" font-weight="700">AWS Cloud</text>

  <!-- Region -->
  <rect x="214" y="138" width="858" height="678" rx="10" fill="none" stroke="#00A4A6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="230" y="160" font-size="12" fill="#00838A" font-weight="700">Region · us-east-1</text>

  <!-- ============ REGIONAL SERVERLESS SERVICES ============ -->
  <!-- EventBridge (Application Integration = pink) -->
  <g>
    <rect x="300" y="182" width="60" height="60" rx="9" fill="#E7157B"/>
    <text x="330" y="219" text-anchor="middle" font-size="22" fill="#fff">&#8646;</text>
    <text x="330" y="260" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">EventBridge</text>
    <text x="330" y="274" text-anchor="middle" font-size="10" fill="#5A6B7B">event bus</text>
  </g>
  <!-- Lambda (Compute = orange) -->
  <g>
    <rect x="452" y="182" width="60" height="60" rx="9" fill="#ED7100"/>
    <text x="482" y="220" text-anchor="middle" font-size="24" fill="#fff">&#955;</text>
    <text x="482" y="260" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Lambda</text>
    <text x="482" y="274" text-anchor="middle" font-size="10" fill="#5A6B7B">control / dispatch</text>
  </g>
  <!-- IAM (Security = red) -->
  <g>
    <rect x="946" y="182" width="60" height="60" rx="9" fill="#DD344C"/>
    <text x="976" y="220" text-anchor="middle" font-size="24" fill="#fff">&#128273;</text>
    <text x="976" y="260" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">IAM</text>
    <text x="976" y="274" text-anchor="middle" font-size="10" fill="#5A6B7B">least privilege</text>
  </g>
  <!-- Bedrock (Machine Learning = teal) -->
  <g>
    <rect x="792" y="404" width="60" height="60" rx="9" fill="#01A88D"/>
    <text x="822" y="442" text-anchor="middle" font-size="22" fill="#fff">&#9673;</text>
    <text x="822" y="482" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Bedrock</text>
    <text x="822" y="496" text-anchor="middle" font-size="10" fill="#5A6B7B">managed backstop</text>
  </g>
  <!-- CloudWatch (Management = rose) -->
  <g>
    <rect x="946" y="404" width="60" height="60" rx="9" fill="#CD2264"/>
    <text x="976" y="442" text-anchor="middle" font-size="22" fill="#fff">&#128200;</text>
    <text x="976" y="482" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">CloudWatch</text>
    <text x="976" y="496" text-anchor="middle" font-size="10" fill="#5A6B7B">logs &amp; metrics</text>
  </g>
  <!-- S3 (Storage = green) -->
  <g>
    <rect x="946" y="600" width="60" height="60" rx="9" fill="#3F8624"/>
    <text x="976" y="638" text-anchor="middle" font-size="22" fill="#fff">&#128451;</text>
    <text x="976" y="678" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">S3</text>
    <text x="976" y="692" text-anchor="middle" font-size="10" fill="#5A6B7B">artifacts</text>
  </g>

  <!-- ============ VPC ============ -->
  <rect x="250" y="300" width="470" height="500" rx="9" fill="none" stroke="#8C4FFF" stroke-width="2"/>
  <text x="266" y="322" font-size="12.5" fill="#6B25E0" font-weight="700">VPC</text>

  <!-- Public subnet -->
  <rect x="272" y="336" width="426" height="96" rx="7" fill="#F2F9EE" stroke="#7AA116" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="288" y="356" font-size="11.5" fill="#4E6C0E" font-weight="700">Public subnet</text>
  <g>
    <rect x="300" y="360" width="56" height="56" rx="9" fill="#8C4FFF"/>
    <text x="328" y="394" text-anchor="middle" font-size="20" fill="#fff">&#8644;</text>
    <text x="420" y="386" font-size="11.5" fill="#232F3E" font-weight="700">NAT Gateway</text>
    <text x="420" y="401" font-size="10" fill="#5A6B7B">controlled egress only</text>
  </g>

  <!-- Private subnet -->
  <rect x="272" y="446" width="426" height="338" rx="7" fill="#EEF5FB" stroke="#147EBA" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="288" y="466" font-size="11.5" fill="#0E5A87" font-weight="700">Private subnet — no inbound from internet</text>

  <!-- OpenClaw on EC2 Spot -->
  <g>
    <rect x="300" y="486" width="60" height="60" rx="9" fill="#ED7100"/>
    <text x="330" y="524" text-anchor="middle" font-size="22" fill="#fff">&#129302;</text>
    <text x="330" y="564" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">OpenClaw</text>
    <text x="330" y="578" text-anchor="middle" font-size="10" fill="#5A6B7B">EC2 Spot · agent</text>
  </g>
  <!-- Ollama on EC2 Spot GPU -->
  <g>
    <rect x="470" y="486" width="60" height="60" rx="9" fill="#ED7100"/>
    <text x="500" y="524" text-anchor="middle" font-size="22" fill="#fff">&#129504;</text>
    <text x="500" y="564" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">Ollama</text>
    <text x="500" y="578" text-anchor="middle" font-size="10" fill="#5A6B7B">EC2 Spot GPU</text>
  </g>
  <!-- n8n on EC2 -->
  <g>
    <rect x="300" y="646" width="60" height="60" rx="9" fill="#ED7100"/>
    <text x="330" y="684" text-anchor="middle" font-size="20" fill="#fff">&#9881;</text>
    <text x="330" y="724" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">n8n</text>
    <text x="330" y="738" text-anchor="middle" font-size="10" fill="#5A6B7B">EC2 · workflows</text>
  </g>
  <!-- EFS -->
  <g>
    <rect x="470" y="646" width="60" height="60" rx="9" fill="#3F8624"/>
    <text x="500" y="684" text-anchor="middle" font-size="20" fill="#fff">&#128190;</text>
    <text x="500" y="724" text-anchor="middle" font-size="11.5" fill="#232F3E" font-weight="700">EFS</text>
    <text x="500" y="738" text-anchor="middle" font-size="10" fill="#5A6B7B">shared state</text>
  </g>

  <!-- ============ CONNECTIONS ============ -->
  <!-- Developer -> GitHub -->
  <line x1="69" y1="220" x2="69" y2="328" stroke="#232F3E" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="78" y="278" font-size="10" fill="#5A6B7B">push / PR</text>

  <!-- GitHub -> EventBridge (webhook, crosses cloud boundary) -->
  <path d="M104,352 C200,352 240,212 298,212" fill="none" stroke="#232F3E" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="150" y="300" font-size="10" fill="#232F3E" font-weight="700">webhook (HTTPS)</text>

  <!-- EventBridge -> Lambda -->
  <line x1="362" y1="212" x2="450" y2="212" stroke="#232F3E" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Lambda -> OpenClaw (dispatch into private subnet) -->
  <path d="M482,244 C482,360 360,400 340,484" fill="none" stroke="#232F3E" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="392" y="360" font-size="10" fill="#5A6B7B">dispatch</text>

  <!-- OpenClaw -> Ollama (primary inference) -->
  <line x1="362" y1="516" x2="468" y2="516" stroke="#232F3E" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="372" y="508" font-size="10" fill="#5A6B7B">inference</text>

  <!-- Ollama -> Bedrock (fallback, via VPC endpoint, purple dashed) -->
  <path d="M532,506 C660,506 720,470 790,452" fill="none" stroke="#8C4FFF" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowP)"/>
  <text x="600" y="486" font-size="10" fill="#6B25E0" font-weight="700">fallback (VPC endpoint)</text>

  <!-- OpenClaw <-> n8n (orchestrate) -->
  <line x1="330" y1="548" x2="330" y2="644" stroke="#232F3E" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="338" y="600" font-size="10" fill="#5A6B7B">orchestrate</text>

  <!-- OpenClaw -> S3 (artifacts, via VPC endpoint) -->
  <path d="M362,500 C700,460 830,580 944,624" fill="none" stroke="#3F8624" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="812" y="600" font-size="10" fill="#2F6417" font-weight="700">artifacts (VPC endpoint)</text>

  <!-- n8n -> GitHub (publish PR, dashed out of cloud) -->
  <path d="M300,676 C150,676 96,470 96,404" fill="none" stroke="#7D8998" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowG)"/>
  <text x="120" y="560" font-size="10" fill="#5A6B7B" font-weight="700">publish (pull request)</text>

  <!-- Private subnet -> NAT (egress) -->
  <line x1="360" y1="486" x2="345" y2="418" stroke="#8C4FFF" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrowP)"/>

  <!-- telemetry -> CloudWatch (grey dotted, routed low to avoid the artifacts arrow) -->
  <path d="M700,690 C860,690 920,520 944,468" fill="none" stroke="#7D8998" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#arrowG)"/>
  <text x="712" y="682" font-size="10" fill="#5A6B7B">logs &amp; metrics</text>

  <!-- IAM scopes (dotted, no data path) -->
  <path d="M946,232 C820,300 700,470 532,506" fill="none" stroke="#DD344C" stroke-width="1.2" stroke-dasharray="2 4"/>
  <text x="820" y="250" font-size="10" fill="#B02436">scopes permissions</text>

  <!-- ============ LEGEND ============ -->
  <g>
    <rect x="214" y="738" width="484" height="1" fill="none"/>
    <text x="560" y="806" text-anchor="middle" font-size="10.5" fill="#5A6B7B">Solid = happy path · Purple dashed = fallback / networking · Grey dashed = async / telemetry · Red dotted = IAM scoping</text>
  </g>

  <!-- Category legend, bottom-left -->
  <g font-size="10.5" fill="#232F3E">
    <rect x="740" y="726" width="14" height="14" rx="3" fill="#ED7100"/><text x="760" y="737">Compute</text>
    <rect x="828" y="726" width="14" height="14" rx="3" fill="#E7157B"/><text x="848" y="737">App Integration</text>
    <rect x="952" y="726" width="14" height="14" rx="3" fill="#01A88D"/><text x="972" y="737">ML</text>
    <rect x="740" y="748" width="14" height="14" rx="3" fill="#3F8624"/><text x="760" y="759">Storage</text>
    <rect x="828" y="748" width="14" height="14" rx="3" fill="#DD344C"/><text x="848" y="759">Security</text>
    <rect x="952" y="748" width="14" height="14" rx="3" fill="#8C4FFF"/><text x="972" y="759">Networking</text>
  </g>
</svg>
