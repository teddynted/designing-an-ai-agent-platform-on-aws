AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  AI Agent Platform — Network foundation (Milestone 2).
  A dedicated VPC with a single public subnet, an internet gateway, a public
  route table, and a default-deny security group for the platform's disposable
  compute. No inbound access is permitted; instances are reached through AWS
  Systems Manager Session Manager, not SSH.

# ---------------------------------------------------------------------------
# Parameters — nothing about the environment is hard-coded.
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: aiap
    AllowedPattern: "[a-z0-9-]+"
    Description: Lower-case project prefix used in resource names and exports.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment. Keeps names and exports unique per stage.

  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR block for the VPC. /16 leaves room for future subnets.

  PublicSubnetCidr:
    Type: String
    Default: 10.20.1.0/24
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR block for the public subnet. A /24 is ample for the foundation.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true       # required for private DNS and VPC endpoints later
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # A single public subnet in the first available AZ. The foundation uses a
  # public subnet deliberately: it needs outbound internet (to bootstrap and to
  # reach model and Git APIs) but no inbound, and a public subnet reaches the
  # internet through the (free) internet gateway rather than a paid NAT gateway.
  # Agent workloads move to private subnets with NAT in a later milestone.
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Default-deny for inbound. No ingress rules are declared, so nothing on the
  # internet can reach the instance. Egress is open because the instance must
  # reach out to bootstrap, pull models, and push to Git; egress is tightened
  # to explicit allow-lists in the security milestone.
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        Platform compute security group. No inbound access; management is via
        SSM Session Manager. Egress open for bootstrap and outbound API calls.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic.
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-instance-sg"

# ---------------------------------------------------------------------------
# Outputs — exported for the compute stack to import. Export names follow the
# convention "${ProjectName}-${Environment}-<Resource>" throughout the project.
# ---------------------------------------------------------------------------
Outputs:
  VpcId:
    Description: The VPC ID.
    Value: !Ref Vpc
    Export:
      Name: !Sub "${ProjectName}-${Environment}-VpcId"

  VpcCidr:
    Description: The VPC CIDR block.
    Value: !Ref VpcCidr
    Export:
      Name: !Sub "${ProjectName}-${Environment}-VpcCidr"

  PublicSubnetId:
    Description: The public subnet ID.
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PublicSubnetId"

  InstanceSecurityGroupId:
    Description: Security group ID for platform compute.
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstanceSecurityGroupId"
