AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  AI Agent Platform — Network foundation (Milestone 2; egress hardening and the
  S3 gateway endpoint added in Milestone 14).
  A dedicated VPC with a single public subnet, an internet gateway, a public
  route table, and a default-deny security group for the platform's disposable
  compute. No inbound access is permitted; instances are reached through AWS
  Systems Manager Session Manager, not SSH. Egress is an allow-list (HTTPS, HTTP
  for OS mirrors, DNS) rather than open, and an S3 gateway endpoint keeps bucket
  traffic on the AWS backbone.

# ---------------------------------------------------------------------------
# Parameters — nothing about the environment is hard-coded.
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: aiap
    AllowedPattern: "[a-z0-9-]+"
    Description: Lower-case project prefix used in resource names and exports.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment. Keeps names and exports unique per stage.

  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR block for the VPC. /16 leaves room for future subnets.

  PublicSubnetCidr:
    Type: String
    Default: 10.20.1.0/24
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR block for the public subnet. A /24 is ample for the foundation.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true       # required for private DNS and VPC endpoints later
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # A single public subnet in the first available AZ. The foundation uses a
  # public subnet deliberately: it needs outbound internet (to bootstrap and to
  # reach model and Git APIs) but no inbound, and a public subnet reaches the
  # internet through the (free) internet gateway rather than a paid NAT gateway.
  # Agent workloads move to private subnets with NAT in a later milestone.
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Default-deny for inbound. No ingress rules are declared, so nothing on the
  # internet can reach the instance. Management is via SSM Session Manager, which
  # is outbound-only — the instance dials AWS, nothing dials the instance.
  #
  # Egress is an allow-list, not "all" (Milestone 14). A box that runs untrusted,
  # attacker-influenced content should be able to reach exactly what it needs and
  # nothing else: an agent that cannot open an arbitrary outbound socket cannot be
  # turned into one that exfiltrates over it. Three protocols cover every
  # legitimate need — HTTPS for AWS APIs, Git and model endpoints; HTTP for the OS
  # package mirrors that still start on port 80; and DNS. (Traffic to the
  # link-local IMDS and Amazon Time Sync addresses is handled by the hypervisor
  # and is not subject to these rules, so NTP and metadata still work.)
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: >-
        Platform compute security group. No inbound access; management is via
        SSM Session Manager. Egress limited to HTTPS, HTTP (OS mirrors) and DNS.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS - AWS APIs (SSM, CloudWatch, S3, Bedrock), Git, model endpoints, package mirrors.
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP - OS package mirrors that redirect through port 80 before upgrading to TLS.
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS (UDP).
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS (TCP, for large responses).
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-instance-sg"

  # An S3 gateway endpoint keeps the instance's S3 traffic — its artifacts, and
  # anything the OS pulls from S3-backed mirrors — on the AWS backbone instead of
  # out through the internet gateway. It is FREE, unlike interface endpoints, so
  # there is no reason not to have it; the route table gets an S3 prefix-list
  # route automatically.
  #
  # The endpoint policy is deliberately left at full access. The real control on
  # what the instance can do to S3 is its INSTANCE ROLE (02-iam), which is already
  # scoped to this project's one bucket — a second, tighter policy here would risk
  # blocking the anonymous, AWS-owned package-repo buckets the OS reads through
  # this same endpoint, for no gain the instance role does not already provide.
  # Interface endpoints (SSM, CloudWatch Logs, EC2 messages) would let the
  # instance run with NO internet egress at all, but each costs ~$7/month; they
  # are documented in SECURITY.md as a production hardening rather than deployed
  # by default.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable

# ---------------------------------------------------------------------------
# Outputs — exported for the compute stack to import. Export names follow the
# convention "${ProjectName}-${Environment}-<Resource>" throughout the project.
# ---------------------------------------------------------------------------
Outputs:
  VpcId:
    Description: The VPC ID.
    Value: !Ref Vpc
    Export:
      Name: !Sub "${ProjectName}-${Environment}-VpcId"

  VpcCidr:
    Description: The VPC CIDR block.
    Value: !Ref VpcCidr
    Export:
      Name: !Sub "${ProjectName}-${Environment}-VpcCidr"

  PublicSubnetId:
    Description: The public subnet ID.
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "${ProjectName}-${Environment}-PublicSubnetId"

  InstanceSecurityGroupId:
    Description: Security group ID for platform compute.
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstanceSecurityGroupId"
