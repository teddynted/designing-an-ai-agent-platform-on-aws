AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  AI Agent Platform — Instance scheduler (Milestone 2 add-on).
  Starts the platform's EC2 instance every evening and stops it every morning,
  so a development environment costs nothing while it is not in use. Two Go
  Lambdas (start and stop) are driven by two EventBridge Scheduler schedules on
  a configurable timezone. All permissions are least-privilege and scoped to the
  one instance.
  Note: a Spot instance can only be stopped/started if it was launched with the
  "stop" interruption behaviour (see the compute stack's SpotInterruptionBehavior
  parameter); a one-time Spot instance can only be terminated.

Parameters:
  ProjectName:
    Type: String
    Default: aiap
    AllowedPattern: "[a-z0-9-]+"
    Description: Lower-case project prefix. Must match the other stacks.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment. Must match the other stacks.

  InstanceId:
    Type: AWS::EC2::Instance::Id
    Description: The EC2 instance to start and stop on the schedule.

  ScheduleTimezone:
    Type: String
    Default: UTC
    Description: >-
      IANA timezone the schedules run in, e.g. Africa/Johannesburg,
      America/New_York, Europe/London. Not hard-coded to UTC.

  StartSchedule:
    Type: String
    Default: "cron(0 18 * * ? *)"
    Description: >-
      EventBridge Scheduler expression for starting the instance. The default is
      18:00 every day, in ScheduleTimezone.

  StopSchedule:
    Type: String
    Default: "cron(0 8 * * ? *)"
    Description: >-
      EventBridge Scheduler expression for stopping the instance. The default is
      08:00 every day, in ScheduleTimezone.

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 180, 365]
    Description: Retention for the Lambda log groups, in days.

  LambdaCodeBucket:
    Type: String
    Description: >-
      S3 bucket holding the packaged Lambda zips. Populated by
      `make -C infra package`.

  StartCodeKey:
    Type: String
    Default: scheduler/start.zip
    Description: S3 key of the start Lambda's zip.

  StopCodeKey:
    Type: String
    Default: scheduler/stop.zip
    Description: S3 key of the stop Lambda's zip.

  LambdaTimeoutSeconds:
    Type: Number
    Default: 30
    MinValue: 10
    MaxValue: 120
    Description: >-
      Lambda timeout. Start/Stop return quickly (they request the transition,
      they do not wait for it), but the SDK's retries need headroom.

Resources:
  # -------------------------------------------------------------------------
  # Lambda execution role — start/stop the one instance, describe, and log.
  # -------------------------------------------------------------------------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-scheduler-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: manage-instance
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Start/Stop are scoped to the single instance this stack manages.
              - Sid: StartStopInstance
                Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${InstanceId}"
              # DescribeInstances does not support resource-level permissions, so
              # it must be "*". It is read-only and low risk.
              - Sid: DescribeInstances
                Effect: Allow
                Action: ec2:DescribeInstances
                Resource: "*"
        - PolicyName: logging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-scheduler-*:*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-scheduler-lambda-role"

  StartFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-${Environment}-scheduler-start"
      RetentionInDays: !Ref LogRetentionDays

  StopFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-${Environment}-scheduler-stop"
      RetentionInDays: !Ref LogRetentionDays

  StartFunction:
    Type: AWS::Lambda::Function
    DependsOn: StartFunctionLogGroup
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-scheduler-start"
      Description: Starts the scheduled EC2 instance.
      Runtime: provided.al2023
      Architectures: [arm64]
      Handler: bootstrap
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: 128
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref StartCodeKey
      Environment:
        Variables:
          INSTANCE_ID: !Ref InstanceId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-scheduler-start"

  StopFunction:
    Type: AWS::Lambda::Function
    DependsOn: StopFunctionLogGroup
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-scheduler-stop"
      Description: Stops the scheduled EC2 instance.
      Runtime: provided.al2023
      Architectures: [arm64]
      Handler: bootstrap
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: 128
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref StopCodeKey
      Environment:
        Variables:
          INSTANCE_ID: !Ref InstanceId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-scheduler-stop"

  # -------------------------------------------------------------------------
  # Scheduler role — lets EventBridge Scheduler invoke the two functions, and
  # nothing else. The SourceAccount condition prevents a confused-deputy.
  # -------------------------------------------------------------------------
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
      Policies:
        - PolicyName: invoke-functions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InvokeSchedulerFunctions
                Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt StartFunction.Arn
                  - !GetAtt StopFunction.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-scheduler-role"

  StartScheduleRule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-start"
      Description: Start the instance each evening.
      State: ENABLED
      ScheduleExpression: !Ref StartSchedule
      ScheduleExpressionTimezone: !Ref ScheduleTimezone
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt StartFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 3
          MaximumEventAgeInSeconds: 3600

  StopScheduleRule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-stop"
      Description: Stop the instance each morning.
      State: ENABLED
      ScheduleExpression: !Ref StopSchedule
      ScheduleExpressionTimezone: !Ref ScheduleTimezone
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt StopFunction.Arn
        RoleArn: !GetAtt SchedulerRole.Arn
        RetryPolicy:
          MaximumRetryAttempts: 3
          MaximumEventAgeInSeconds: 3600

Outputs:
  StartFunctionArn:
    Description: ARN of the start Lambda.
    Value: !GetAtt StartFunction.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SchedulerStartFunctionArn"

  StopFunctionArn:
    Description: ARN of the stop Lambda.
    Value: !GetAtt StopFunction.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-SchedulerStopFunctionArn"

  StartScheduleName:
    Description: Name of the start schedule.
    Value: !Ref StartScheduleRule

  StopScheduleName:
    Description: Name of the stop schedule.
    Value: !Ref StopScheduleRule
