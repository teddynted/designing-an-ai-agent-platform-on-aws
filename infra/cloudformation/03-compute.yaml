AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  AI Agent Platform — Compute (Milestones 2 and 3).
  A single, disposable EC2 Spot instance that future milestones will use to host
  OpenClaw, Ollama, and n8n. This template provisions the instance only; it does
  not install those applications. The instance is treated as ephemeral: its
  encrypted root volume is deleted on termination and holds no durable state.
  Milestone 3 adds the on-host half of Spot interruption handling — a drain agent
  that watches the instance metadata service for the two-minute reclaim notice
  and saves the instance's work to S3 before it is taken away. The account-side
  half (EventBridge rules and Lambdas) is in 08-spot.yaml.

Parameters:
  ProjectName:
    Type: String
    Default: aiap
    AllowedPattern: "[a-z0-9-]+"
    Description: Lower-case project prefix. Must match the network and IAM stacks.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment. Must match the other stacks.

  InstanceType:
    Type: String
    Default: t3.xlarge
    Description: >-
      Instance type for the foundation. t3.xlarge (4 vCPU, 16 GiB) is NOT
      free-tier eligible and costs roughly $0.17/hour on-demand (~$120/month if
      left running). Use the instance scheduler to limit its hours, or set
      t3.micro (free-tier eligible) for a near-zero-cost environment.

  RootVolumeSize:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 200
    Description: >-
      Root EBS volume size in GiB. Sized for the OS, container images, and
      temporary runtime files only — never for durable application state.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: >-
      Amazon Linux 2023 AMI, resolved from the AWS-managed SSM public parameter
      so no AMI ID is hard-coded and the latest patched image is always used.
      Override with a specific AMI ID to pin the image, or with a custom AMI once
      Milestone 4 bakes one.

  SshKeyName:
    Type: String
    Default: ""
    Description: >-
      Optional EC2 key pair for SSH. Leave empty — the default, and the
      recommendation. The instance has no inbound access and is managed through
      SSM Session Manager, so a key pair buys nothing and adds a credential to
      lose. Set it only if you must attach a key for a specific reason.

  SubnetId:
    Type: String
    Default: ""
    Description: >-
      Optional subnet override. Empty (the default) imports the public subnet
      from the network stack. Set it to place the instance in a subnet this
      project did not create, e.g. an existing VPC.

  SecurityGroupId:
    Type: String
    Default: ""
    Description: >-
      Optional security group override. Empty (the default) imports the
      instance security group from the network stack.

  PurchaseOption:
    Type: String
    Default: spot
    AllowedValues: [spot, on-demand]
    Description: >-
      How the instance is purchased. Spot is the cost-optimised default. Use
      on-demand if the account's Spot quota is zero — common on new accounts —
      which fails with "Max spot instance count exceeded"; switch back to spot
      once a Spot quota increase is approved.

  SpotInterruptionBehavior:
    Type: String
    Default: terminate
    AllowedValues: [terminate, stop]
    Description: >-
      What happens to a Spot instance on interruption. "terminate" (a one-time
      request) is the disposable default. Choose "stop" (a persistent request)
      only if you intend to stop/start the instance on a schedule — a Spot
      instance can be stopped and started only when it was launched with the
      "stop" behaviour. Ignored for on-demand. On-demand is always stoppable.

  SpotMaxPrice:
    Type: String
    Default: ""
    Description: >-
      Optional maximum hourly price for the Spot instance, in USD (e.g. 0.08).
      Leave empty — the default and the recommendation — to cap at the On-Demand
      price, which is what Spot charges at worst anyway. A lower cap does not
      make the instance cheaper (you always pay the market price, not your bid);
      it only makes it interruptible sooner and harder to launch. Set it as a
      spend guard rail, not as a discount.

  DrainUnits:
    Type: String
    Default: ""
    Description: >-
      Space-separated systemd units the drain agent stops when an interruption
      notice arrives, before it saves the instance's artifacts — e.g.
      "ollama.service n8n.service". Empty until a later milestone installs a
      workload; the agent then has nothing to stop and only saves artifacts.

  DrainPollSeconds:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 20
    Description: >-
      How often the drain agent polls the instance metadata service for an
      interruption notice. AWS recommends every 5 seconds: the notice gives about
      120 seconds, and every second spent not noticing is a second not draining.

Conditions:
  # Request Spot only when asked. On-demand omits InstanceMarketOptions entirely.
  UseSpot: !Equals [!Ref PurchaseOption, spot]
  # A stoppable Spot instance needs a persistent request; the disposable default
  # uses a one-time request that can only be terminated.
  StoppableSpot: !Equals [!Ref SpotInterruptionBehavior, stop]
  HasSpotMaxPrice: !Not [!Equals [!Ref SpotMaxPrice, ""]]
  HasSshKey: !Not [!Equals [!Ref SshKeyName, ""]]
  HasSubnetOverride: !Not [!Equals [!Ref SubnetId, ""]]
  HasSecurityGroupOverride: !Not [!Equals [!Ref SecurityGroupId, ""]]

Resources:
  # A launch template carries everything about how the instance boots. The
  # CloudFormation AWS::EC2::Instance resource cannot request Spot directly, so
  # the Spot purchase (and the rest of the boot configuration) lives here. The
  # template is also what a later milestone's Auto Scaling group will reuse.
  #
  # Note: changing anything in here produces a new template version, and the
  # instance below tracks the latest version — so a change to the user data or
  # the instance type replaces the instance. That is intended. The instance is
  # disposable; if replacing it loses something, that something was in the wrong
  # place.
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-${Environment}-lt"
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        ImageId: !Ref LatestAmiId
        # No SSH key by default, deliberately. The instance has no inbound access
        # and is managed exclusively through SSM Session Manager.
        KeyName: !If [HasSshKey, !Ref SshKeyName, !Ref "AWS::NoValue"]
        IamInstanceProfile:
          Name:
            Fn::ImportValue: !Sub "${ProjectName}-${Environment}-InstanceProfileName"
        SecurityGroupIds:
          - !If
            - HasSecurityGroupOverride
            - !Ref SecurityGroupId
            - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-InstanceSecurityGroupId"
        # Enforce IMDSv2: instance metadata requires a session token, which
        # blocks the SSRF-style credential theft that IMDSv1 is prone to. The
        # drain agent below reads the interruption notice through this same
        # endpoint, and fetches a token like any other caller.
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 1
        # Purchase on the Spot market by default. Disposable "terminate" behaviour
        # uses a one-time request; "stop" (for scheduled stop/start) uses a
        # persistent request, the only kind a Spot instance can be stopped from.
        # On-demand omits this block entirely and is always stoppable.
        InstanceMarketOptions:
          !If
            - UseSpot
            - MarketType: spot
              SpotOptions:
                SpotInstanceType: !If [StoppableSpot, persistent, one-time]
                InstanceInterruptionBehavior: !Ref SpotInterruptionBehavior
                MaxPrice: !If [HasSpotMaxPrice, !Ref SpotMaxPrice, !Ref "AWS::NoValue"]
            - !Ref "AWS::NoValue"
        # The only volume is the root volume: encrypted, gp3, and deleted with
        # the instance. There is deliberately no secondary or persistent volume —
        # which is precisely why the drain agent exists.
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            dnf -y update

            # The AWS CLI ships with Amazon Linux 2023, but the drain agent is
            # useless without it, so do not assume.
            command -v aws >/dev/null 2>&1 || dnf -y install awscli-2 || true

            # Where a workload leaves anything worth keeping. The drain agent
            # uploads this directory to S3 when the instance is reclaimed, so a
            # later milestone's agent writes its output here and nowhere else.
            install -d -m 0755 /var/lib/${ProjectName}/artifacts
            install -d -m 0755 /etc/${ProjectName}

            # Configuration for the drain agent, kept out of the script so the
            # script is a plain file with no templating in it. The bucket name is
            # derived by the same naming convention the IAM stack grants against.
            #
            # Every value is quoted. This file is *sourced* by the agent, so an
            # unquoted DRAIN_UNITS holding two units ("ollama.service n8n.service")
            # would parse as an assignment followed by a command, and the agent
            # would die on the second word — during the two minutes when it is the
            # only thing that can save the instance's work.
            cat > /etc/${ProjectName}/drain.env <<ENV
            ARTIFACT_BUCKET="${ProjectName}-${Environment}-artifacts-${AWS::AccountId}-${AWS::Region}"
            ARTIFACT_DIR="/var/lib/${ProjectName}/artifacts"
            DRAIN_LOG="/var/log/${ProjectName}-spot-drain.log"
            DRAIN_UNITS="${DrainUnits}"
            POLL_SECONDS="${DrainPollSeconds}"
            AWS_DEFAULT_REGION="${AWS::Region}"
            ENV

            # -----------------------------------------------------------------
            # The drain agent.
            #
            # This is the half of Spot interruption handling that a Lambda cannot
            # do. When AWS decides to reclaim the instance it writes a notice to
            # the instance metadata service and gives roughly 120 seconds. Only
            # something running ON the instance can stop the workload cleanly and
            # get its work off the disk before the disk goes away.
            #
            # The IMDS path 404s for the entire life of a healthy instance, so
            # the "error" branch of the poll is the normal case, and a body is
            # the exception that matters.
            # -----------------------------------------------------------------
            cat > /usr/local/bin/spot-drain <<'DRAIN'
            #!/bin/bash
            # Watch for a Spot interruption notice; drain the instance when it comes.
            set -uo pipefail

            . /etc/${ProjectName}/drain.env

            IMDS="http://169.254.169.254"

            log() {
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) spot-drain: $*" >> "$DRAIN_LOG"
            }

            # IMDSv2: every read needs a session token first.
            imds_token() {
              curl -sf -X PUT "$IMDS/latest/api/token" \
                -H "X-aws-ec2-metadata-token-ttl-seconds: 300"
            }

            imds_get() {
              curl -sf -H "X-aws-ec2-metadata-token: $1" "$IMDS/latest/meta-data/$2"
            }

            # Everything that must happen before the instance disappears, in the
            # order it must happen in. There is no second attempt: whatever is not
            # done when AWS reclaims the instance is not done at all.
            drain() {
              notice="$1"
              instance_id="$2"
              log "interruption notice: $notice"

              # 1. Stop the workloads, so nothing is still writing while we upload.
              #    Unquoted on purpose: the units are one space-separated string,
              #    and the default guards against the agent dying on `set -u` if
              #    the variable is ever absent. Nothing here may abort the drain.
              for unit in ${!DRAIN_UNITS:-}; do
                log "stopping $unit"
                systemctl stop "$unit" || log "WARNING: could not stop $unit"
              done

              # 2. Save the work. This is the entire reason the agent exists: the
              #    instance is disposable, its output is not.
              if [ -d "$ARTIFACT_DIR" ] && [ -n "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
                log "saving artifacts to s3://$ARTIFACT_BUCKET/drain/$instance_id/"
                aws s3 sync "$ARTIFACT_DIR" \
                  "s3://$ARTIFACT_BUCKET/drain/$instance_id/artifacts/" --only-show-errors \
                  && log "artifacts saved" \
                  || log "ERROR: artifact sync failed"
              else
                log "no artifacts to save"
              fi

              # 3. Leave a marker. Without it, a post-mortem cannot tell an
              #    instance that drained cleanly from one that simply vanished.
              echo "$notice" > /tmp/interruption.json
              aws s3 cp /tmp/interruption.json \
                "s3://$ARTIFACT_BUCKET/drain/$instance_id/interruption.json" --only-show-errors \
                || log "ERROR: could not upload the interruption marker"

              log "drain complete"
            }

            log "drain agent started; polling every $POLL_SECONDS seconds"

            while true; do
              token="$(imds_token)" || { sleep "$POLL_SECONDS"; continue; }

              # 404 until AWS issues a notice — the healthy path, every time.
              notice="$(imds_get "$token" spot/instance-action)" || {
                sleep "$POLL_SECONDS"
                continue
              }

              instance_id="$(imds_get "$token" instance-id)"
              drain "$notice" "$instance_id"
              exit 0
            done
            DRAIN
            chmod 0755 /usr/local/bin/spot-drain

            # Restart=on-failure, not always: once the agent has drained, it exits
            # 0 and must stay exited. Restarting it would make it find the same
            # notice and drain again, uploading over the work it just saved.
            cat > /etc/systemd/system/spot-drain.service <<'UNIT'
            [Unit]
            Description=AI Agent Platform — EC2 Spot interruption drain agent
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            ExecStart=/usr/local/bin/spot-drain
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT

            systemctl daemon-reload
            systemctl enable --now spot-drain.service

            echo "${ProjectName}-${Environment} instance bootstrapped at $(date -u)" > /var/log/platform-bootstrap.log
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-${Environment}-instance"
              - Key: Lifecycle
                Value: disposable
              # Project and Environment are not decoration. EC2's Spot and
              # state-change events carry no tags, so the handlers in 08-spot
              # resolve the instance and read these two tags to decide whether the
              # event is this platform's. An instance without them is invisible to
              # its own interruption handling.
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-${Environment}-root-volume"
              - Key: Lifecycle
                Value: disposable
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment

  AIPlatformInstance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      SubnetId: !If
        - HasSubnetOverride
        - !Ref SubnetId
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-PublicSubnetId"

Outputs:
  InstanceId:
    Description: The EC2 instance ID.
    Value: !Ref AIPlatformInstance
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstanceId"

  InstanceAvailabilityZone:
    Description: The AZ the instance launched in.
    Value: !GetAtt AIPlatformInstance.AvailabilityZone
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstanceAvailabilityZone"

  InstancePrivateIp:
    Description: The instance's private IPv4 address.
    Value: !GetAtt AIPlatformInstance.PrivateIp
    Export:
      Name: !Sub "${ProjectName}-${Environment}-InstancePrivateIp"

  PurchaseOption:
    Description: How the instance was purchased (spot or on-demand).
    Value: !Ref PurchaseOption

  DrainLog:
    Description: On-instance log the drain agent writes to.
    Value: !Sub "/var/log/${ProjectName}-spot-drain.log"
